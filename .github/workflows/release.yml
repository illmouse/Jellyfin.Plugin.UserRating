name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Get version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Checkout tag for build
      run: git checkout "v${{ steps.version.outputs.version }}"

    - name: Update .csproj version
      run: |
        VERSION=${{ steps.version.outputs.version }}
        sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>${VERSION}<\/AssemblyVersion>/" Jellyfin.Plugin.UserRatings.csproj
        sed -i "s/<FileVersion>.*<\/FileVersion>/<FileVersion>${VERSION}<\/FileVersion>/" Jellyfin.Plugin.UserRatings.csproj

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Create ZIP
      run: |
        cd bin/Release/net9.0
        zip -j Jellyfin.Plugin.UserRatings.zip Jellyfin.Plugin.UserRatings.dll
        cd ../../..

    - name: Calculate checksum
      id: checksum
      run: |
        CHECKSUM=$(md5sum bin/Release/net9.0/Jellyfin.Plugin.UserRatings.zip | awk '{print $1}')
        echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
        echo "Checksum: $CHECKSUM"

    - name: Switch back to main and update manifest
      run: |
        VERSION=${{ steps.version.outputs.version }}
        CHECKSUM=${{ steps.checksum.outputs.checksum }}
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Switch back to main
        git checkout main

        # Install jq for JSON manipulation
        sudo apt-get install -y jq

        # Extract changelog for this version
        # Strip trailing .0 (fourth octet) so v1.10.0.0 matches ## v1.10.0 in CHANGELOG
        CHANGELOG_VERSION=$(echo "$VERSION" | sed 's/\.0$//')
        if [ -f CHANGELOG.md ]; then
          CHANGELOG_TEXT=$(awk "/^## v${CHANGELOG_VERSION}/{found=1; next} /^## v/{found=0} found && /^---$/{found=0; next} found" CHANGELOG.md | head -c 500 | tr '\n' ' ' | sed 's/"/\\"/g')
        else
          CHANGELOG_TEXT="Release $VERSION"
        fi

        # Build new version entry
        NEW_ENTRY=$(jq -n \
          --arg ver "$VERSION" \
          --arg changelog "$CHANGELOG_TEXT" \
          --arg targetAbi "10.11.0.0" \
          --arg sourceUrl "https://github.com/${{ github.repository }}/releases/download/v$VERSION/Jellyfin.Plugin.UserRatings.zip" \
          --arg checksum "$CHECKSUM" \
          --arg timestamp "$TIMESTAMP" \
          '{
            version: $ver,
            changelog: $changelog,
            targetAbi: $targetAbi,
            sourceUrl: $sourceUrl,
            checksum: $checksum,
            timestamp: $timestamp
          }')

        # Prepend new version entry to existing manifest (deduplicate)
        jq --argjson new "$NEW_ENTRY" --arg ver "$VERSION" '
          if .[0].versions | any(.version == $ver) then
            .[0].versions = (.[0].versions | map(if .version == $ver then $new else . end))
          else
            .[0].versions = [$new] + .[0].versions
          end
        ' manifest.json > manifest.json.tmp
        mv manifest.json.tmp manifest.json

        # Update imageUrl to use this repository
        jq --arg repo "${{ github.repository }}" '.[0].imageUrl = ("https://raw.githubusercontent.com/" + $repo + "/main/icon.png")' manifest.json > manifest.json.tmp2
        mv manifest.json.tmp2 manifest.json

        # Update README repo URL to use this repository
        sed -i "s|https://raw.githubusercontent.com/[^/]*/[^/]*/main/manifest.json|https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json|g" README.md

        # Also update csproj on main
        sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>${VERSION}<\/AssemblyVersion>/" Jellyfin.Plugin.UserRatings.csproj
        sed -i "s/<FileVersion>.*<\/FileVersion>/<FileVersion>${VERSION}<\/FileVersion>/" Jellyfin.Plugin.UserRatings.csproj

    - name: Commit and push version files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add manifest.json Jellyfin.Plugin.UserRatings.csproj README.md
        git commit -m "Release v${{ steps.version.outputs.version }}: update manifest, csproj, and README" || echo "No changes to commit"
        git push origin main

    - name: Build release body
      run: |
        VERSION=${{ steps.version.outputs.version }}
        CHECKSUM=${{ steps.checksum.outputs.checksum }}

        # Extract the section for this version from CHANGELOG.md
        # Strip trailing .0 (fourth octet) so v1.10.0.0 matches ## v1.10.0 in CHANGELOG
        CHANGELOG_VERSION=$(echo "$VERSION" | sed 's/\.0$//')
        if [ -f CHANGELOG.md ]; then
          CHANGELOG=$(awk "/^## v${CHANGELOG_VERSION}/{found=1; next} /^## v/{found=0} found && /^---$/{found=0; next} found" CHANGELOG.md)
        else
          CHANGELOG=""
        fi

        # Build release body
        {
          echo "## Jellyfin User Ratings v${VERSION}"
          echo ""
          if [ -n "$CHANGELOG" ]; then
            echo "$CHANGELOG"
            echo ""
          fi
          echo "### Installation"
          echo "Add this repository to Jellyfin:"
          echo "\`\`\`"
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json"
          echo "\`\`\`"
          echo ""
          echo "### Checksums"
          echo "- MD5: ${CHECKSUM}"
        } > /tmp/release_body.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: bin/Release/net9.0/Jellyfin.Plugin.UserRatings.zip
        body_path: /tmp/release_body.txt
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}